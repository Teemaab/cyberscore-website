[build]
  publish = "."
  functions = "netlify/functions"

# Redirect /api/chatbot → the Netlify function transparently
# The frontend calls /api/chatbot — this makes it work without changing index.html
[[redirects]]
  from = "/api/chatbot"
  to   = "/.netlify/functions/chatbot"
  status = 200
  force  = true
